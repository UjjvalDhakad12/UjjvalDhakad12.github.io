<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Quiz Game</h1>
        <p id="question">Question will appear here</p>
        <div class="options">
            <button class="option" onclick="checkAnswer(this)">Option 1</button>
            <button class="option" onclick="checkAnswer(this)">Option 2</button>
            <button class="option" onclick="checkAnswer(this)">Option 3</button>
            <button class="option" onclick="checkAnswer(this)">Option 4</button>
        </div>

        <p id="result"></p>
        <button id="next" onclick="nextQuestion()">Next Question</button>
        <button id="reset" onclick="resetGame()">Play Again</button>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
